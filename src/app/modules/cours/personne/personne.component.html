<h2 class="container my-5">Liste de personnes</h2>
<div class="container mt-3">
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Identifiant</th>
                <th>Nom</th>
                <th>Prénom</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let elt of personnes">
                <td>{{ elt.id }}</td>
                <td>{{ elt.nom }}</td>
                <td>{{ elt.prenom }}</td>
            </tr>
        </tbody>
    </table>
</div>
