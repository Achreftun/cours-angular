<h2>Formulaire Réactif</h2>
<form [formGroup]="personneForm">
    <div>
        <label for="id">Identifiant</label>
        <input type="text" id="id" name="id" formControlName="id">
    </div>
    <div>
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" formControlName="nom">
    </div>
    <div>
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" name="prenom" formControlName="prenom">
    </div>
    <button (click)="afficherTout()">Cliquer</button>
</form>
